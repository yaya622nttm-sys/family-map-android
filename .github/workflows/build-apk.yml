name: Build APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  # 手動実行もできる
  workflow_dispatch:

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest

    steps:
      # ── ソースコードを取得 ──
      - name: Checkout code
        uses: actions/checkout@v4

      # ── JDK 17 をセットアップ ──
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Gradle 8.6 を直接インストール（wrapperJAR不要）──
      - name: Install Gradle 8.6
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.6-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.6/bin" >> $GITHUB_PATH

      # ── google-services.json を生成（GitHub Secrets から） ──
      #    ※ Secretsの設定方法は下記READMEを参照
      - name: Create google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > app/google-services.json
            echo "✅ google-services.json を Secrets から生成しました"
          else
            echo "⚠️ GOOGLE_SERVICES_JSON が設定されていません。既存のファイルを使用します"
          fi

      # ── local.properties を生成（Maps APIキー） ──
      - name: Create local.properties
        env:
          MAPS_API_KEY: ${{ secrets.MAPS_API_KEY }}
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          if [ -n "$MAPS_API_KEY" ]; then
            echo "MAPS_API_KEY=$MAPS_API_KEY" >> local.properties
            echo "✅ MAPS_API_KEY を Secrets から設定しました"
          else
            echo "MAPS_API_KEY=PLACEHOLDER_KEY" >> local.properties
            echo "⚠️ MAPS_API_KEY が設定されていません。プレースホルダーを使用します（地図は表示されません）"
          fi

      # ── Debug APK をビルド ──
      - name: Build Debug APK
        run: gradle assembleDebug --stacktrace

      # ── APK をアップロード（GitHubからダウンロード可能） ──
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FamilyMap-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── ビルド情報を表示 ──
      - name: Show APK info
        run: |
          APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
          if [ -f "$APK_PATH" ]; then
            SIZE=$(du -h "$APK_PATH" | cut -f1)
            echo "✅ APKビルド成功！"
            echo "📦 ファイルサイズ: $SIZE"
            echo "📥 ActionsタブのArtifactsからダウンロードできます"
          fi
